name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: orbitbuild

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-rs
        uses: cargo-bins/cargo-install@v1
        with:
          crate: cross

      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: Install cross-compilation strip tools
        if: matrix.arch == 'aarch64'
        run: sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Strip binary
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            aarch64-linux-gnu-strip -s target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          else
            strip -s target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          fi

      - name: Prepare release artifact
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl
          chmod +x release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl

      - name: Generate SHA256 checksum
        working-directory: release
        run: |
          sha256sum ${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl \
            > ${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: |
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl.sha256
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/orbitbuild-*
