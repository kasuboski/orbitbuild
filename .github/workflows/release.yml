name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: orbitbuild

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Strip binary
        run: strip -s target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

      - name: Prepare release artifact
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl
          chmod +x release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl

      - name: Generate SHA256 checksum
        working-directory: release
        run: |
          sha256sum ${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl \
            > ${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.arch }}
          path: |
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl
            release/${{ env.BINARY_NAME }}-${{ matrix.arch }}-unknown-linux-musl.sha256
          retention-days: 1

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/orbitbuild-*
