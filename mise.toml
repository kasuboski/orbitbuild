[tools]
rust = "latest"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.lint]
description = "Run clippy lints"
run = "cargo clippy -- -D warnings"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.check]
description = "Quick check for compilation errors"
run = "cargo check"

[tasks.integration-test]
description = "Run 3-node integration test (station + satellite + mission-control)"
run = "./scripts/integration-test.sh"

[tasks.build-test]
description = "Full E2E build test (requires Docker) — builds an image through P2P tunnel"
run = "./scripts/build-test.sh"
